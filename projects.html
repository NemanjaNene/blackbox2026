<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlackBox | Our Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font); background: #0a0a14; color: #fff; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }

    .dot-grid-bg {
      position: fixed; inset: 0; z-index: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
    }

    .back {
      position: fixed; top: 24px; left: 24px; z-index: 50;
      font-size: .8rem; font-weight: 500; letter-spacing: .04em; text-transform: uppercase;
      color: #60a5fa;
      background: rgba(96,165,250,.08);
      border: 1px solid rgba(96,165,250,.2);
      padding: 10px 20px;
      border-radius: 100px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      transition: all .3s ease;
      display: flex; align-items: center; gap: 8px;
    }
    .back svg { width: 14px; height: 14px; transition: transform .3s ease; }
    .back:hover {
      color: #fff;
      background: rgba(96,165,250,.18);
      border-color: rgba(96,165,250,.45);
      box-shadow: 0 0 20px rgba(96,165,250,.15);
    }
    .back:hover svg { transform: translateX(-3px); }

    .page { max-width: 900px; margin: 0 auto; padding: 100px 40px 80px; position: relative; z-index: 1; }
    .page h1 { font-size: 2.8rem; font-weight: 300; letter-spacing: -.03em; margin-bottom: 60px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }

    .text-rotate { display: inline-flex; flex-wrap: wrap; white-space: pre-wrap; position: relative; background: #60a5fa; color: #000; overflow: hidden; padding: 2px 12px; border-radius: 8px; }
    .text-rotate-word { display: inline-flex; overflow: hidden; padding-bottom: 2px; }
    .text-rotate-element { display: inline-block; }
    .text-rotate-space { white-space: pre; }

    .card {
      position: relative;
      width: 100%;
      aspect-ratio: 16/10;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(17,17,17,0.85);
      margin-bottom: 40px;
    }
    .card iframe {
      position: absolute;
      top: 0; left: 0;
      width: 1440px; height: 900px;
      transform: scale(0.625);
      transform-origin: top left;
      border: none;
      pointer-events: none;
    }
    .card-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .8rem;
      color: rgba(255,255,255,.08);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .card-glass {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
    }

    .glass-surface {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: opacity 0.26s ease-out;
    }
    .glass-surface__filter {
      width: 100%; height: 100%;
      pointer-events: none;
      position: absolute;
      inset: 0;
      opacity: 0;
      z-index: -1;
    }
    .glass-surface__content {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      border-radius: inherit;
      position: relative;
      z-index: 1;
      font-size: .9rem;
      font-weight: 600;
      color: #fff;
      gap: 8px;
      white-space: nowrap;
    }
    .glass-surface--svg {
      background: hsl(0 0% 0% / var(--glass-frost, 0));
      backdrop-filter: var(--filter-id, url(#glass-filter)) saturate(var(--glass-saturation, 1));
      box-shadow:
        0 0 2px 1px color-mix(in oklch, white, transparent 65%) inset,
        0 0 10px 4px color-mix(in oklch, white, transparent 85%) inset,
        0px 4px 16px rgba(17,17,26,0.05),
        0px 8px 24px rgba(17,17,26,0.05),
        0px 16px 56px rgba(17,17,26,0.05),
        0px 4px 16px rgba(17,17,26,0.05) inset,
        0px 8px 24px rgba(17,17,26,0.05) inset,
        0px 16px 56px rgba(17,17,26,0.05) inset;
    }

    @media (max-width: 768px) {
      .page { padding: 80px 20px 60px; }
      .page h1 { font-size: 2rem; }
      .card iframe { width: 1200px; height: 750px; transform: scale(0.42); }
      .card { margin-bottom: 30px; border-radius: 14px; }
    }
    @media (max-width: 480px) {
      .page { padding: 70px 16px 50px; }
      .page h1 { font-size: 1.5rem; gap: 8px; margin-bottom: 36px; }
      .card iframe { width: 960px; height: 600px; transform: scale(0.33); }
      .card { margin-bottom: 24px; border-radius: 12px; }
      .card-glass { transform: translate(-50%, -50%) scale(0.85); }
      .back { top: 16px; left: 16px; padding: 8px 16px; font-size: .7rem; }
    }
  </style>
</head>
<body>

  <div class="dot-grid-bg" id="dotGridBg"></div>

  <a href="index.html" class="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>Back</a>

  <div class="page">
    <h1>Our <span id="rotatingTitle"></span> Projects</h1>

    <div class="card">
      <iframe src="https://joyfruitspremium.com/en/" loading="lazy" sandbox="allow-scripts allow-same-origin"></iframe>
      <div class="card-glass">
        <a href="https://joyfruitspremium.com/en/" target="_blank" rel="noopener" data-glass>
          joyfruitspremium.com
        </a>
      </div>
    </div>

    <div class="card">
      <iframe src="https://kompresoring.com/" loading="lazy" sandbox="allow-scripts allow-same-origin"></iframe>
      <div class="card-glass">
        <a href="https://kompresoring.com/" target="_blank" rel="noopener" data-glass>
          kompresoring.com
        </a>
      </div>
    </div>

    <div class="card card-empty">
      Coming Soon
      <div class="card-glass">
        <div data-glass>Project 03</div>
      </div>
    </div>

    <div class="card card-empty">
      Coming Soon
      <div class="card-glass">
        <div data-glass>Project 04</div>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script type="module">
    import { initDotGrid } from './js/dotgrid.js';
    const bg = document.getElementById('dotGridBg');
    if (bg) {
      initDotGrid(bg, {
        dotSize: 4,
        gap: 18,
        baseColor: '#2a2545',
        activeColor: '#60a5fa',
        proximity: 150,
        shockRadius: 250,
        shockStrength: 5,
        resistance: 750,
        returnDuration: 1.5
      });
    }
  </script>
  <script type="module">
    import { initRotatingText } from './js/rotatingtext.js';
    const rt = document.getElementById('rotatingTitle');
    if (rt) {
      initRotatingText(rt, {
        texts: ['Best', 'Latest', 'Creative', 'Custom'],
        rotationInterval: 2000,
        staggerDuration: 0.025,
        staggerFrom: 'last'
      });
    }
  </script>
  <script type="module">
    import { createGlassSurface } from './js/glasssurface.js';

    document.querySelectorAll('[data-glass]').forEach(el => {
      createGlassSurface(el, {
        width: 300,
        height: 80,
        borderRadius: 50,
        displace: 0.5,
        distortionScale: -180,
        redOffset: 0,
        greenOffset: 10,
        blueOffset: 20,
        brightness: 50,
        opacity: 0.93,
        blur: 11,
        mixBlendMode: 'screen'
      });
    });
  </script>
</body>
</html>
